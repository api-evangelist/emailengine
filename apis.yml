aid: emailengine
name: EmailEngine
description: >-
  EmailEngine is a self-hosted email automation platform that provides a unified
  REST API for accessing email accounts via IMAP, SMTP, the Gmail API, and the
  Microsoft Graph API. It exposes JSON payloads, real-time webhooks, OAuth2
  integration, an IMAP/SMTP proxy, hosted authentication forms, low-code custom
  integrations, Prometheus monitoring, and bounce detection so developers can
  build modern email functionality without paying per-account fees.
