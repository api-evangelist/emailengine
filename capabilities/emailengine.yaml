          value: $.
    - name: v1-oauth2
      path: /v1/oauth2
      operations:
      - name: listoauth2apps
        method: GET
        description: List OAuth2 applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-outbox
      path: /v1/outbox
      operations:
      - name: listoutbox
        method: GET
        description: List outbox items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-stats
      path: /v1/stats
      operations:
      - name: getstats
        method: GET
        description: Retrieve EmailEngine statistics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
