naftiko: 1.0.0-alpha2
info:
  label: EmailEngine API
  description: 'EmailEngine API. 15 operations. Lead operation: List mailboxes for account. Self-contained Naftiko capability
    covering one Emailengine business surface.'
  tags:
  - Emailengine
  - EmailEngine API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EMAILENGINE_API_KEY: EMAILENGINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: emailengine
    baseUri: https://api.emailengine.app
    description: EmailEngine API business capability. Self-contained, no shared references.
    resources:
    - name: v1-account-account-mailboxes
      path: /v1/account/{account}/mailboxes
      operations:
      - name: listmailboxes
        method: GET
        description: List mailboxes for account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-account-account-messages
      path: /v1/account/{account}/messages
      operations:
      - name: listmessages
        method: GET
        description: List messages for account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-account-account-submit
      path: /v1/account/{account}/submit
      operations:
      - name: submitmessage
        method: POST
        description: Submit message for delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts
      path: /v1/accounts
      operations:
      - name: listaccounts
        method: GET
        description: List accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-autoconfig
      path: /v1/autoconfig
      operations:
      - name: getautoconfig
        method: GET
        description: Get email autoconfig settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-deliverytest-check-deliverytest
      path: /v1/deliverytest/check/{deliverytest}
      operations:
      - name: checkdeliverytest
        method: GET
        description: Check delivery test status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-gateways
      path: /v1/gateways
      operations:
      - name: listgateways
        method: GET
        description: List SMTP gateways
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-license
      path: /v1/license
      operations:
      - name: getlicense
        method: GET
        description: Get license info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
